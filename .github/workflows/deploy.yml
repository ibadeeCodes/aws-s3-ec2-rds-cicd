name: Deploy via Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (pipeline context only)
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

          set -e

          APP_DIR=/home/ec2-user/aws-s3-ec2-rds-cicd
          DEPLOY_DIR=/home/ec2-user/aws-s3-ec2-rds-cicd/deployment

          echo "=============================="
          echo "Deploying version: $TAG_NAME"
          echo "=============================="

          cd $APP_DIR

          echo "Fetching tags..."
          git fetch --tags

          echo "Saving previous version..."
          if [ -f "$DEPLOY_DIR/current_version.txt" ]; then
            cp "$DEPLOY_DIR/current_version.txt" "$DEPLOY_DIR/previous_version.txt"
          else
            echo "v0.0" > "$DEPLOY_DIR/previous_version.txt"
          fi

          echo "Previous version:"
          cat "$DEPLOY_DIR/previous_version.txt"

          echo "Checking out new tag..."
          git checkout "$TAG_NAME"

          echo "$TAG_NAME" > "$DEPLOY_DIR/current_version.txt"

          echo "Installing dependencies..."
          npm install

          echo "Building app..."
          npm run build

          echo "Running migrations..."
          npm run migration:run

          echo "Restarting app..."
          pm2 delete nest-app || true
          pm2 start ecosystem.config.js

          echo "Waiting for health check..."
          sleep 5

          curl -f http://localhost:3000/health || (

            echo "❌ Deployment failed — starting rollback..."

            echo "Reverting database..."
            npm run migration:revert

            echo "Reading previous version..."
            PREV_VERSION=$(cat "$DEPLOY_DIR/previous_version.txt" | tr -d '[:space:]')

            echo "PREV_VERSION = $PREV_VERSION"

            if [ -z "$PREV_VERSION" ]; then
              echo "❌ No previous version found. Abort rollback."
              exit 1
            fi

            echo "Rolling back code..."
            cd $APP_DIR
            git checkout "$PREV_VERSION"

            echo "Restoring version file..."
            echo "$PREV_VERSION" > "$DEPLOY_DIR/current_version.txt"

            echo "Reinstalling dependencies..."
            npm install

            echo "Rebuilding..."
            npm run build

            echo "Restarting app..."
            pm2 delete nest-app || true
            pm2 start ecosystem.config.js

            echo "✅ Rollback completed successfully"
            exit 1
          )

          echo "=============================="
          echo "✅ Deployment successful"
          echo "=============================="

          EOF